<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doge School Chorebooks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }
        
        h1 {
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .section {
            margin-bottom: 35px;
        }
        
        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Comic Sans MS', cursive;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.3);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .chorebooks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .chorebook-btn {
            padding: 15px !important;
            font-size: 0.95em !important;
            width: 100% !important;
            margin-top: 0 !important;
            text-align: center;
        }
        
        .chorebook-btn.musescore {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%) !important;
        }
        
        .chorebook-btn.scribd {
            background: linear-gradient(135deg, #4ECDC4 0%, #45B8B0 100%) !important;
        }
        
        .chorebook-btn.choralwiki {
            background: linear-gradient(135deg, #FFE66D 0%, #FFC700 100%) !important;
            color: #333 !important;
        }
        
        .chorebook-btn.imslp {
            background: linear-gradient(135deg, #95E1D3 0%, #7FD8BE 100%) !important;
        }
        
        .chorebook-btn.sheetmusicplus {
            background: linear-gradient(135deg, #F38181 0%, #F27474 100%) !important;
        }
        
        .chorebook-btn.musicca {
            background: linear-gradient(135deg, #AA96DA 0%, #9B88D1 100%) !important;
        }
        
        .doge-emoji {
            font-size: 2em;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s;
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        
        .modal-content h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .modal-content p {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.1em;
            word-break: break-all;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .modal-buttons button {
            width: auto;
            padding: 10px 25px;
            margin: 0;
        }
        
        .close-btn {
            background: #FF6B6B !important;
        }
        
        .close-btn:hover {
            background: #FF5252 !important;
        }
        
        .go-btn {
            background: #4ECDC4 !important;
        }
        
        .go-btn:hover {
            background: #45B8B0 !important;
        }
        
        #browserFrame {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 10px;
            display: none;
        }
        
        #browserFrame.show {
            display: block;
        }
        
        .back-btn {
            background: #FF6B6B !important;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-btn.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" id="backBtn" onclick="goBack()">← Back to Chorebooks</button>
    
    <div class="container" id="mainContainer">
        <h1><span class="doge-emoji">🐕</span> School Chorebooks <span class="doge-emoji">🐕</span></h1>
        <p class="subtitle">Much music. Very choir. Wow.</p>
        
        <!-- Quick Access Section -->
        <div class="section">
            <div class="section-title">🎵 Popular Chorebook Sites</div>
            <div class="chorebooks-grid">
                <button class="chorebook-btn musescore" onclick="openSite('musescore.com')">🎼 MuseScore</button>
                <button class="chorebook-btn imslp" onclick="openSite('imslp.org')">📚 IMSLP</button>
                <button class="chorebook-btn choralwiki" onclick="openSite('choralwiki.org')">🎤 Choral Wiki</button>
                <button class="chorebook-btn musicca" onclick="openSite('musicca.com')">🎹 MusicCA</button>
                <button class="chorebook-btn sheetmusicplus" onclick="openSite('sheetmusicplus.com')">🎶 Sheet Music Plus</button>
                <button class="chorebook-btn scribd" onclick="openSite('scribd.com')">📖 Scribd</button>
            </div>
        </div>
        
        <!-- Custom URL Section -->
        <div class="section">
            <div class="section-title">🌐 Custom Chorebook URL</div>
            <div class="input-group">
                <label for="urlInput">Enter Chorebook Website URL:</label>
                <input type="text" id="urlInput" placeholder="example.com/chorebooks" required>
            </div>
            <button onclick="unblockURL()">🚀 Such Access! Wow!</button>
        </div>
    </div>
    
    <iframe id="browserFrame"></iframe>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>✨ Converting to IP... ✨</h2>
            <p id="modalMessage">Much DNS conversion! Very wow!</p>
            <div class="modal-buttons">
                <button class="go-btn" onclick="confirmGo()">✅ Load!</button>
                <button class="close-btn" onclick="closeModal()">❌ Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        let pendingURL = '';
        
        // DNS lookup service - converts domain to IP
        async function domainToIP(domain) {
            try {
                // Remove protocol if present
                domain = domain.replace(/^https?:\/\//, '').split('/')[0];
                
                // Using DNS lookup API
                const response = await fetch(`https://dns.google/resolve?name=${domain}&type=A`, {
                    headers: {
                        'Accept': 'application/json'
                    }
                }).catch(() => null);
                
                if (response && response.ok) {
                    const data = await response.json();
                    if (data.Answer && data.Answer.length > 0) {
                        return data.Answer[0].data;
                    }
                }
                
                // Fallback: Use alternate DNS service
                const alt = await fetch(`https://cloudflare-dns.com/dns-query?name=${domain}&type=A`, {
                    headers: {
                        'Accept': 'application/dns-json'
                    }
                }).catch(() => null);
                
                if (alt && alt.ok) {
                    const altData = await alt.json();
                    if (altData.Answer && altData.Answer.length > 0) {
                        return altData.Answer[0].data;
                    }
                }
                
                return null;
            } catch (e) {
                console.log('IP conversion failed, using domain directly');
                return null;
            }
        }
        
        function openSite(domain) {
            pendingURL = domain;
            showModal(domain);
        }
        
        function unblockURL() {
            const urlInput = document.getElementById('urlInput').value.trim();
            
            if (!urlInput) {
                alert('Much error! Please enter URL. Wow.');
                return;
            }
            
            let url = urlInput;
            // Remove protocol if present
            url = url.replace(/^https?:\/\//, '').split('/')[0];
            
            pendingURL = url;
            showModal(url);
        }
        
        function showModal(url) {
            const modal = document.getElementById('modal');
            const message = document.getElementById('modalMessage');
            message.textContent = `Converting ${url} to IP address...`;
            modal.classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            pendingURL = '';
        }
        
        async function confirmGo() {
            if (pendingURL) {
                const message = document.getElementById('modalMessage');
                message.textContent = 'Resolving DNS...';
                
                // Try to convert to IP
                const ip = await domainToIP(pendingURL);
                
                if (ip) {
                    message.textContent = `Connecting to IP: ${ip}`;
                    // Use IP address instead of domain
                    const frame = document.getElementById('browserFrame');
                    frame.src = `https://${ip}`;
                } else {
                    message.textContent = `Using domain: ${pendingURL}`;
                    // Fallback to domain
                    const frame = document.getElementById('browserFrame');
                    frame.src = `https://${pendingURL}`;
                }
                
                setTimeout(() => {
                    const frame = document.getElementById('browserFrame');
                    frame.classList.add('show');
                    document.getElementById('mainContainer').style.display = 'none';
                    document.getElementById('backBtn').classList.add('show');
                    closeModal();
                }, 1500);
            }
        }
        
        function goBack() {
            document.getElementById('browserFrame').classList.remove('show');
            document.getElementById('browserFrame').src = '';
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('backBtn').classList.remove('show');
        }
        
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                unblockURL();
            }
        });
        
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
