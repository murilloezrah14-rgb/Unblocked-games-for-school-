<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doge School Chorebooks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }
        
        h1 {
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .section {
            margin-bottom: 35px;
        }
        
        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Comic Sans MS', cursive;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.3);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .chorebooks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .chorebook-btn {
            padding: 15px !important;
            font-size: 0.95em !important;
            width: 100% !important;
            margin-top: 0 !important;
            text-align: center;
        }
        
        .chorebook-btn.musescore {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%) !important;
        }
        
        .chorebook-btn.imslp {
            background: linear-gradient(135deg, #4ECDC4 0%, #45B8B0 100%) !important;
        }
        
        .chorebook-btn.choralwiki {
            background: linear-gradient(135deg, #FFE66D 0%, #FFC700 100%) !important;
            color: #333 !important;
        }
        
        .chorebook-btn.musicca {
            background: linear-gradient(135deg, #95E1D3 0%, #7FD8BE 100%) !important;
        }
        
        .chorebook-btn.sheetmusicplus {
            background: linear-gradient(135deg, #F38181 0%, #F27474 100%) !important;
        }
        
        .chorebook-btn.scribd {
            background: linear-gradient(135deg, #AA96DA 0%, #9B88D1 100%) !important;
        }
        
        .doge-emoji {
            font-size: 2em;
        }
        
        #browserFrame {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 10px;
            display: none;
        }
        
        #browserFrame.show {
            display: block;
        }
        
        .back-btn {
            background: #FF6B6B !important;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-btn.show {
            display: block;
        }
        
        .info-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            color: #333;
        }
        
        .info-box strong {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <button class="back-btn" id="backBtn" onclick="goBack()">← Back to Chorebooks</button>
    
    <div class="container" id="mainContainer">
        <h1><span class="doge-emoji">🐕</span> School Chorebooks <span class="doge-emoji">🐕</span></h1>
        <p class="subtitle">Much music. Very choir. Wow.</p>
        
        <!-- Quick Access Section -->
        <div class="section">
            <div class="section-title">🎵 Popular Chorebook Sites</div>
            <div class="chorebooks-grid">
                <button class="chorebook-btn musescore" onclick="openURL('https://musescore.com')">🎼 MuseScore</button>
                <button class="chorebook-btn imslp" onclick="openURL('https://imslp.org')">📚 IMSLP</button>
                <button class="chorebook-btn choralwiki" onclick="openURL('https://choralwiki.org')">🎤 Choral Wiki</button>
                <button class="chorebook-btn musicca" onclick="openURL('https://musicca.com')">🎹 MusicCA</button>
                <button class="chorebook-btn sheetmusicplus" onclick="openURL('https://www.sheetmusicplus.com')">🎶 Sheet Music Plus</button>
                <button class="chorebook-btn scribd" onclick="openURL('https://www.scribd.com')">📖 Scribd</button>
            </div>
        </div>
        
        <!-- Custom URL Section -->
        <div class="section">
            <div class="section-title">🌐 Custom Chorebook URL</div>
            <div class="input-group">
                <label for="urlInput">Enter Chorebook Website URL:</label>
                <input type="text" id="urlInput" placeholder="https://example.com" required>
            </div>
            <button onclick="handleCustomURL()">🚀 Such Access! Wow!</button>
        </div>
        
        <div class="info-box">
            <strong>⚠️ Note:</strong> If sites are still blocked, your school network may be using DNS-level filtering. Try accessing from mobile hotspot as a backup!
        </div>
    </div>
    
    <iframe id="browserFrame"></iframe>
    
    <script>
        function openURL(url) {
            // Open in new tab instead of iframe
            window.open(url, '_blank');
        }
        
        function handleCustomURL() {
            const urlInput = document.getElementById('urlInput').value.trim();
            
            if (!urlInput) {
                alert('Much error! Please enter URL. Wow.');
                return;
            }
            
            let url = urlInput;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            try {
                new URL(url);
                window.open(url, '_blank');
            } catch (e) {
                alert('Such invalid URL! Wow.');
            }
        }
        
        function goBack() {
            document.getElementById('browserFrame').classList.remove('show');
            document.getElementById('browserFrame').src = '';
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('backBtn').classList.remove('show');
        }
        
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleCustomURL();
            }
        });
    </script>
</body>
</html>
