<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doge School Chorebooks & Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }
        
        h1 {
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .section {
            margin-bottom: 35px;
        }
        
        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Comic Sans MS', cursive;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.3);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .game-btn {
            padding: 15px !important;
            font-size: 0.95em !important;
            width: 100% !important;
            margin-top: 0 !important;
            text-align: center;
        }
        
        .game-btn.snake {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%) !important;
        }
        
        .game-btn.flappy {
            background: linear-gradient(135deg, #4ECDC4 0%, #45B8B0 100%) !important;
        }
        
        .game-btn.pong {
            background: linear-gradient(135deg, #FFE66D 0%, #FFC700 100%) !important;
            color: #333 !important;
        }
        
        .game-btn.puzzle {
            background: linear-gradient(135deg, #95E1D3 0%, #7FD8BE 100%) !important;
        }
        
        .game-btn.math {
            background: linear-gradient(135deg, #F38181 0%, #F27474 100%) !important;
        }
        
        .doge-emoji {
            font-size: 2em;
        }
        
        #gameContainer {
            display: none;
            background: #333;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        #gameContainer.show {
            display: block;
        }
        
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: black;
            border: 3px solid gold;
            border-radius: 5px;
        }
        
        #browserFrame {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 10px;
            display: none;
        }
        
        #browserFrame.show {
            display: block;
        }
        
        .back-btn {
            background: #FF6B6B !important;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-btn.show {
            display: block;
        }
        
        .game-info {
            color: #FFD700;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button class="back-btn" id="backBtn" onclick="goBack()">← Back to Menu</button>
    
    <div class="container" id="mainContainer">
        <h1><span class="doge-emoji">🐕</span> Doge Games & Chorebooks <span class="doge-emoji">🐕</span></h1>
        <p class="subtitle">Much fun. Very game. Wow.</p>
        
        <!-- Games Section -->
        <div class="section">
            <div class="section-title">🎮 Built-In Games (No Blocking!)</div>
            <div class="games-grid">
                <button class="game-btn snake" onclick="startGame('snake')">🐍 Snake</button>
                <button class="game-btn flappy" onclick="startGame('flappy')">🐦 Flappy Bird</button>
                <button class="game-btn pong" onclick="startGame('pong')">🏓 Pong</button>
                <button class="game-btn puzzle" onclick="startGame('puzzle')">🎯 Puzzle</button>
                <button class="game-btn math" onclick="startGame('slope')">📐 Math Helper</button>
            </div>
        </div>
        
        <!-- Custom URL Section -->
        <div class="section">
            <div class="section-title">🌐 Custom Website URL</div>
            <div class="input-group">
                <label for="urlInput">Enter Website URL:</label>
                <input type="text" id="urlInput" placeholder="https://example.com" required>
            </div>
            <button onclick="loadCustomURL()">🚀 Load Website!</button>
        </div>
    </div>
    
    <div id="gameContainer" class="container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="game-info" id="gameInfo">Loading game...</div>
    </div>
    
    <iframe id="browserFrame"></iframe>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let currentGame = null;
        
        // SNAKE GAME
        class SnakeGame {
            constructor() {
                this.gridSize = 20;
                this.tileCount = canvas.width / this.gridSize;
                this.snake = [{x: 10, y: 10}];
                this.food = {x: 15, y: 15};
                this.direction = {x: 1, y: 0};
                this.nextDirection = {x: 1, y: 0};
                this.score = 0;
                
                document.addEventListener('keydown', (e) => this.handleInput(e));
            }
            
            handleInput(e) {
                if (e.key === 'ArrowUp' && this.direction.y === 0) this.nextDirection = {x: 0, y: -1};
                if (e.key === 'ArrowDown' && this.direction.y === 0) this.nextDirection = {x: 0, y: 1};
                if (e.key === 'ArrowLeft' && this.direction.x === 0) this.nextDirection = {x: -1, y: 0};
                if (e.key === 'ArrowRight' && this.direction.x === 0) this.nextDirection = {x: 1, y: 0};
            }
            
            update() {
                this.direction = this.nextDirection;
                const head = this.snake[0];
                const newHead = {x: head.x + this.direction.x, y: head.y + this.direction.y};
                
                // Wall collision
                if (newHead.x < 0 || newHead.x >= this.tileCount || newHead.y < 0 || newHead.y >= this.tileCount) {
                    return false;
                }
                
                // Self collision
                if (this.snake.some(s => s.x === newHead.x && s.y === newHead.y)) return false;
                
                this.snake.unshift(newHead);
                
                // Food collision
                if (newHead.x === this.food.x && newHead.y === this.food.y) {
                    this.score += 10;
                    this.food = {x: Math.floor(Math.random() * this.tileCount), y: Math.floor(Math.random() * this.tileCount)};
                } else {
                    this.snake.pop();
                }
                
                return true;
            }
            
            draw() {
                // Background
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Grid
                ctx.strokeStyle = '#333';
                for (let i = 0; i <= this.tileCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * this.gridSize, 0);
                    ctx.lineTo(i * this.gridSize, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * this.gridSize);
                    ctx.lineTo(canvas.width, i * this.gridSize);
                    ctx.stroke();
                }
                
                // Snake
                ctx.fillStyle = '#00FF00';
                this.snake.forEach(segment => {
                    ctx.fillRect(segment.x * this.gridSize + 1, segment.y * this.gridSize + 1, this.gridSize - 2, this.gridSize - 2);
                });
                
                // Food
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(this.food.x * this.gridSize + 1, this.food.y * this.gridSize + 1, this.gridSize - 2, this.gridSize - 2);
                
                // Score
                document.getElementById('gameInfo').textContent = `Score: ${this.score} | Use Arrow Keys to Move`;
            }
        }
        
        // FLAPPY BIRD GAME
        class FlappyGame {
            constructor() {
                this.bird = {x: 100, y: canvas.height / 2, radius: 10, velocityY: 0};
                this.pipes = [];
                this.score = 0;
                this.gameRunning = true;
                this.pipeDistance = 150;
                this.pipeGap = 100;
                
                document.addEventListener('keydown', () => this.flap());
                document.addEventListener('click', () => this.flap());
            }
            
            flap() {
                this.bird.velocityY = -8;
            }
            
            update() {
                this.bird.velocityY += 0.4;
                this.bird.y += this.bird.velocityY;
                
                // Create pipes
                if (this.pipes.length === 0 || this.pipes[this.pipes.length - 1].x < canvas.width - this.pipeDistance) {
                    const gapY = Math.random() * (canvas.height - this.pipeGap - 100) + 50;
                    this.pipes.push({x: canvas.width, gapY: gapY, width: 50});
                }
                
                // Update pipes
                this.pipes = this.pipes.filter(pipe => {
                    pipe.x -= 5;
                    return pipe.x > -50;
                });
                
                // Collision detection
                if (this.bird.y + this.bird.radius > canvas.height || this.bird.y - this.bird.radius < 0) return false;
                
                for (let pipe of this.pipes) {
                    if (this.bird.x + this.bird.radius > pipe.x && this.bird.x - this.bird.radius < pipe.x + pipe.width) {
                        if (this.bird.y - this.bird.radius < pipe.gapY || this.bird.y + this.bird.radius > pipe.gapY + this.pipeGap) {
                            return false;
                        }
                    }
                    
                    // Scoring
                    if (pipe.x === this.bird.x - this.bird.radius) this.score++;
                }
                
                return true;
            }
            
            draw() {
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Bird
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.bird.x, this.bird.y, this.bird.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Pipes
                ctx.fillStyle = '#228B22';
                this.pipes.forEach(pipe => {
                    ctx.fillRect(pipe.x, 0, pipe.width, pipe.gapY);
                    ctx.fillRect(pipe.x, pipe.gapY + this.pipeGap, pipe.width, canvas.height);
                });
                
                document.getElementById('gameInfo').textContent = `Score: ${this.score} | Click or Press Space to Flap`;
            }
        }
        
        // PONG GAME
        class PongGame {
            constructor() {
                this.ball = {x: canvas.width / 2, y: canvas.height / 2, radius: 8, vx: 5, vy: 5};
                this.paddleLeft = {x: 10, y: canvas.height / 2 - 50, width: 10, height: 100};
                this.paddleRight = {x: canvas.width - 20, y: canvas.height / 2 - 50, width: 10, height: 100};
                this.scoreLeft = 0;
                this.scoreRight = 0;
                this.keysPressed = {};
                
                document.addEventListener('keydown', (e) => this.keysPressed[e.key] = true);
                document.addEventListener('keyup', (e) => this.keysPressed[e.key] = false);
            }
            
            update() {
                // Ball movement
                this.ball.x += this.ball.vx;
                this.ball.y += this.ball.vy;
                
                // Ball collision with top/bottom
                if (this.ball.y - this.ball.radius < 0 || this.ball.y + this.ball.radius > canvas.height) {
                    this.ball.vy = -this.ball.vy;
                }
                
                // Paddle movement
                if (this.keysPressed['w'] && this.paddleLeft.y > 0) this.paddleLeft.y -= 6;
                if (this.keysPressed['s'] && this.paddleLeft.y < canvas.height - 100) this.paddleLeft.y += 6;
                if (this.keysPressed['ArrowUp'] && this.paddleRight.y > 0) this.paddleRight.y -= 6;
                if (this.keysPressed['ArrowDown'] && this.paddleRight.y < canvas.height - 100) this.paddleRight.y += 6;
                
                // Ball collision with paddles
                if (this.ball.x - this.ball.radius < this.paddleLeft.x + this.paddleLeft.width &&
                    this.ball.y > this.paddleLeft.y && this.ball.y < this.paddleLeft.y + this.paddleLeft.height) {
                    this.ball.vx = -this.ball.vx;
                }
                
                if (this.ball.x + this.ball.radius > this.paddleRight.x &&
                    this.ball.y > this.paddleRight.y && this.ball.y < this.paddleRight.y + this.paddleRight.height) {
                    this.ball.vx = -this.ball.vx;
                }
                
                // Scoring
                if (this.ball.x < 0) {
                    this.scoreRight++;
                    this.ball = {x: canvas.width / 2, y: canvas.height / 2, radius: 8, vx: 5, vy: 5};
                }
                if (this.ball.x > canvas.width) {
                    this.scoreLeft++;
                    this.ball = {x: canvas.width / 2, y: canvas.height / 2, radius: 8, vx: -5, vy: 5};
                }
                
                return true;
            }
            
            draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Center line
                ctx.strokeStyle = '#FFF';
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Ball
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(this.ball.x, this.ball.y, this.ball.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Paddles
                ctx.fillRect(this.paddleLeft.x, this.paddleLeft.y, this.paddleLeft.width, this.paddleLeft.height);
                ctx.fillRect(this.paddleRight.x, this.paddleRight.y, this.paddleRight.width, this.paddleRight.height);
                
                document.getElementById('gameInfo').textContent = `Left: ${this.scoreLeft} | Right: ${this.scoreRight} | W/S or Arrow Keys to Move`;
            }
        }
        
        // PUZZLE GAME (Simple Match Game)
        class PuzzleGame {
            constructor() {
                this.tiles = [];
                this.selected = [];
                this.matches = 0;
                this.moves = 0;
                this.initTiles();
                
                canvas.addEventListener('click', (e) => this.handleClick(e));
            }
            
            initTiles() {
                const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FFA500', '#800080'];
                const shuffled = [...colors, ...colors].sort(() => Math.random() - 0.5);
                
                for (let i = 0; i < 16; i++) {
                    this.tiles.push({
                        id: i,
                        color: shuffled[i],
                        revealed: false,
                        matched: false,
                        x: (i % 4) * 150 + 25,
                        y: Math.floor(i / 4) * 100 + 50
                    });
                }
            }
            
            handleClick(e) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                for (let tile of this.tiles) {
                    if (x > tile.x && x < tile.x + 130 && y > tile.y && y < tile.y + 80 && !tile.matched && this.selected.length < 2) {
                        if (!this.selected.find(t => t.id === tile.id)) {
                            tile.revealed = true;
                            this.selected.push(tile);
                            
                            if (this.selected.length === 2) {
                                this.moves++;
                                if (this.selected[0].color === this.selected[1].color) {
                                    this.selected[0].matched = true;
                                    this.selected[1].matched = true;
                                    this.matches++;
                                    this.selected = [];
                                } else {
                                    setTimeout(() => {
                                        this.selected[0].revealed = false;
                                        this.selected[1].revealed = false;
                                        this.selected = [];
                                    }, 500);
                                }
                            }
                        }
                    }
                }
            }
            
            update() {
                return this.matches < 8;
            }
            
            draw() {
                ctx.fillStyle = '#222';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                for (let tile of this.tiles) {
                    if (tile.matched) {
                        ctx.fillStyle = '#555';
                    } else if (tile.revealed) {
                        ctx.fillStyle = tile.color;
                    } else {
                        ctx.fillStyle = '#999';
                    }
                    
                    ctx.fillRect(tile.x, tile.y, 130, 80);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(tile.x, tile.y, 130, 80);
                }
                
                if (this.matches === 8) {
                    document.getElementById('gameInfo').textContent = `🎉 YOU WON! Moves: ${this.moves}`;
                } else {
                    document.getElementById('gameInfo').textContent = `Matches: ${this.matches}/8 | Moves: ${this.moves} | Click tiles to match`;
                }
            }
        }
        
        function startGame(gameName) {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('backBtn').classList.add('show');
            
            if (gameName === 'slope') {
                // Load slope game from external URL (disguised as "Math Helper")
                document.getElementById('browserFrame').classList.add('show');
                document.getElementById('browserFrame').src = 'https://slopegame.online/';
            } else {
                document.getElementById('gameContainer').classList.add('show');
                
                if (gameName === 'snake') currentGame = new SnakeGame();
                else if (gameName === 'flappy') currentGame = new FlappyGame();
                else if (gameName === 'pong') currentGame = new PongGame();
                else if (gameName === 'puzzle') currentGame = new PuzzleGame();
                
                gameLoop();
            }
        }
        
        function gameLoop() {
            if (!currentGame) return;
            
            const continueGame = currentGame.update();
            currentGame.draw();
            
            if (continueGame) {
                requestAnimationFrame(gameLoop);
            } else if (currentGame instanceof SnakeGame || currentGame instanceof FlappyGame) {
                document.getElementById('gameInfo').textContent += ' | GAME OVER! Click Back to return.';
            }
        }
        
        function loadCustomURL() {
            const urlInput = document.getElementById('urlInput').value.trim();
            
            if (!urlInput) {
                alert('Much error! Please enter URL. Wow.');
                return;
            }
            
            let url = urlInput;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            try {
                new URL(url);
                document.getElementById('mainContainer').style.display = 'none';
                document.getElementById('browserFrame').classList.add('show');
                document.getElementById('backBtn').classList.add('show');
                document.getElementById('browserFrame').src = url;
            } catch (e) {
                alert('Such invalid URL! Wow.');
            }
        }
        
        function goBack() {
            currentGame = null;
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('gameContainer').classList.remove('show');
            document.getElementById('browserFrame').classList.remove('show');
            document.getElementById('browserFrame').src = '';
            document.getElementById('backBtn').classList.remove('show');
        }
        
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadCustomURL();
            }
        });
    </script>
</body>
</html>
