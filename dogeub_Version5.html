<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doge Unblocker & Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .section {
            margin-bottom: 35px;
        }
        
        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Comic Sans MS', cursive;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.3);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .game-btn {
            padding: 12px !important;
            font-size: 1em !important;
            width: 100% !important;
            margin-top: 0 !important;
        }
        
        .game-btn.snake {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%) !important;
        }
        
        .game-btn.flappy {
            background: linear-gradient(135deg, #4ECDC4 0%, #45B8B0 100%) !important;
        }
        
        .game-btn.pong {
            background: linear-gradient(135deg, #FFE66D 0%, #FFC700 100%) !important;
            color: #333 !important;
        }
        
        .game-btn.2048 {
            background: linear-gradient(135deg, #95E1D3 0%, #7FD8BE 100%) !important;
        }
        
        .doge-emoji {
            font-size: 2em;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s;
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        
        .modal-content h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .modal-content p {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.1em;
            word-break: break-all;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .modal-buttons button {
            width: auto;
            padding: 10px 25px;
            margin: 0;
        }
        
        .close-btn {
            background: #FF6B6B !important;
        }
        
        .close-btn:hover {
            background: #FF5252 !important;
        }
        
        .go-btn {
            background: #4ECDC4 !important;
        }
        
        .go-btn:hover {
            background: #45B8B0 !important;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="doge-emoji">🐕</span> Doge Unblocker <span class="doge-emoji">🐕</span></h1>
        <p class="subtitle">Much proxy. Very unblock. Wow.</p>
        
        <!-- Unblocker Section -->
        <div class="section">
            <div class="section-title">🌐 Unblock Website</div>
            <div class="input-group">
                <label for="urlInput">Enter Website URL:</label>
                <input type="text" id="urlInput" placeholder="https://example.com" required>
            </div>
            <button onclick="unblockURL()">🚀 Such Unblock! Wow!</button>
        </div>
        
        <!-- Games Section -->
        <div class="section">
            <div class="section-title">🎮 Fun Games</div>
            <p style="color: #666; margin-bottom: 15px; text-align: center;">Much gaming. Very wow. So fun!</p>
            <div class="games-grid">
                <button class="game-btn snake" onclick="playGame('snake')">🐍 Snake</button>
                <button class="game-btn flappy" onclick="playGame('flappy')">🐦 Flappy Bird</button>
                <button class="game-btn pong" onclick="playGame('pong')">🏓 Pong</button>
                <button class="game-btn 2048" onclick="playGame('2048')">🎯 2048</button>
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>✨ Unblocking... ✨</h2>
            <p id="modalMessage">Much redirecting! Very wow!</p>
            <div class="modal-buttons">
                <button class="go-btn" onclick="confirmGo()">✅ Go!</button>
                <button class="close-btn" onclick="closeModal()">❌ Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        let pendingURL = '';
        
        function unblockURL() {
            const urlInput = document.getElementById('urlInput').value.trim();
            
            if (!urlInput) {
                alert('Much error! Please enter URL. Wow.');
                return;
            }
            
            let url = urlInput;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            try {
                new URL(url);
            } catch (e) {
                alert('Such invalid URL! Wow.');
                return;
            }
            
            // Use multiple free proxy services
            const proxyServices = [
                `https://cors-anywhere.herokuapp.com/${url}`,
                `https://api.codetabs.com/v1/proxy?quest=${url}`,
                `https://allorigins.win/get?url=${encodeURIComponent(url)}&raw=true`
            ];
            
            pendingURL = proxyServices[0]; // Default to first proxy
            showModal();
        }
        
        function showModal() {
            const modal = document.getElementById('modal');
            const message = document.getElementById('modalMessage');
            message.textContent = `Opening with proxy...`;
            modal.classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            pendingURL = '';
        }
        
        function confirmGo() {
            if (pendingURL) {
                window.location.href = pendingURL;
            }
            closeModal();
        }
        
        function playGame(game) {
            const gameURLs = {
                'snake': 'https://playsnake.org/',
                'flappy': 'https://flappybird.io/',
                'pong': 'https://www.ponggame.org/',
                '2048': 'https://play2048.co/'
            };
            
            if (gameURLs[game]) {
                window.open(gameURLs[game], '_blank');
            }
        }
        
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                unblockURL();
            }
        });
        
        // Close modal when clicking outside of it
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
